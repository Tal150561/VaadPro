<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VaadPro — כניסה</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0d1117; --surface:#161b22; --border:#30363d; --accent:#25D366; --accent3:#075E54; --text:#e6edf3; --text2:#8b949e; --danger:#f85149; --warn:#e3b341; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Heebo',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; }
  .logo-area { display:flex; align-items:center; gap:12px; margin-bottom:32px; }
  .logo-icon { width:52px; height:52px; background:var(--accent); border-radius:13px; display:flex; align-items:center; justify-content:center; font-size:26px; box-shadow:0 4px 16px rgba(37,211,102,.35); }
  .logo-text h1 { font-size:1.8rem; font-weight:900; }
  .logo-text h1 span { color:var(--accent); }
  .logo-text p { color:var(--text2); font-size:0.82rem; margin-top:2px; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:36px 32px; width:100%; max-width:420px; }
  .tabs { display:flex; gap:0; margin-bottom:28px; background:var(--bg); border-radius:8px; padding:3px; }
  .tab { flex:1; padding:9px; text-align:center; border-radius:6px; font-weight:700; font-size:0.9rem; cursor:pointer; color:var(--text2); transition:all .2s; border:none; background:none; font-family:'Heebo',sans-serif; }
  .tab.active { background:var(--accent); color:#000; }
  label { display:block; font-size:0.82rem; color:var(--text2); margin-bottom:5px; }
  input { width:100%; padding:11px 14px; background:var(--bg); border:1px solid var(--border); border-radius:8px; color:var(--text); font-family:'Heebo',sans-serif; font-size:0.95rem; margin-bottom:14px; transition:border .2s; }
  input:focus { outline:none; border-color:var(--accent); }
  .btn { width:100%; padding:12px; background:var(--accent); color:#000; border:none; border-radius:8px; font-family:'Heebo',sans-serif; font-size:1rem; font-weight:700; cursor:pointer; transition:opacity .2s; margin-top:4px; }
  .btn:hover { opacity:0.85; }
  .btn:disabled { opacity:0.5; cursor:not-allowed; }
  .msg { padding:12px 14px; border-radius:8px; font-size:0.88rem; margin-bottom:14px; display:none; }
  .msg.ok  { background:rgba(37,211,102,.12); border:1px solid rgba(37,211,102,.3); color:var(--accent); }
  .msg.err { background:rgba(248,81,73,.12); border:1px solid rgba(248,81,73,.3); color:var(--danger); }
  .forgot { text-align:left; margin-top:-8px; margin-bottom:14px; }
  .forgot a { font-size:0.82rem; color:var(--text2); text-decoration:none; }
  .forgot a:hover { color:var(--accent); }
  .trial-note { background:rgba(37,211,102,.06); border:1px solid rgba(37,211,102,.2); border-radius:8px; padding:12px 14px; font-size:0.82rem; color:var(--text2); margin-bottom:16px; line-height:1.5; }
  .trial-note strong { color:var(--accent); }
</style>
</head>
<body>

<div class="logo-area">
  <div class="logo-icon">🏠</div>
  <div class="logo-text">
    <h1>Vaad<span>Pro</span></h1>
    <p>ניהול ועד הבית החכם</p>
  </div>
</div>

<div class="card">
  <div class="tabs">
    <button class="tab active" id="tabLogin" onclick="showTab('login')">כניסה</button>
    <button class="tab" id="tabRegister" onclick="showTab('register')">הרשמה</button>
  </div>

  <!-- LOGIN -->
  <div id="panelLogin">
    <div class="msg" id="msgLogin"></div>
    <label>מייל</label>
    <input type="email" id="loginEmail" placeholder="your@email.com" dir="ltr">
    <label>סיסמה</label>
    <input type="password" id="loginPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="forgot"><a href="/reset-password.html">שכחתי סיסמה</a></div>
    <button class="btn" id="btnLogin" onclick="doLogin()">כניסה</button>
  </div>

  <!-- REGISTER -->
  <div id="panelRegister" style="display:none;">
    <div class="trial-note">✨ <strong>30 יום ניסיון חינם</strong> — כל הפיצ'רים פתוחים, ללא כרטיס אשראי.</div>
    <div class="msg" id="msgRegister"></div>
    <label>שם מלא</label>
    <input type="text" id="regName" placeholder="ישראל ישראלי">
    <label>שם הבניין</label>
    <input type="text" id="regBuilding" placeholder='למשל: "רחוב הרצל 5, תל אביב"'>
    <label>מייל</label>
    <input type="email" id="regEmail" placeholder="your@email.com" dir="ltr">
    <label>טלפון</label>
    <input type="tel" id="regPhone" placeholder="05X-XXXXXXX" dir="ltr">
    <label>סיסמה</label>
    <input type="password" id="regPass" placeholder="לפחות 6 תווים" onkeydown="if(event.key==='Enter')doRegister()">
    <button class="btn" id="btnRegister" onclick="doRegister()">הרשמה חינמית</button>
  </div>
</div>

<script>
function showTab(tab) {
  document.getElementById('panelLogin').style.display    = tab === 'login'    ? 'block' : 'none';
  document.getElementById('panelRegister').style.display = tab === 'register' ? 'block' : 'none';
  document.getElementById('tabLogin').className    = 'tab' + (tab === 'login'    ? ' active' : '');
  document.getElementById('tabRegister').className = 'tab' + (tab === 'register' ? ' active' : '');
}

function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg ' + type;
  el.style.display = 'block';
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  if (!email || !pass) { showMsg('msgLogin', 'יש למלא מייל וסיסמה', 'err'); return; }
  const btn = document.getElementById('btnLogin');
  btn.disabled = true; btn.textContent = 'מתחבר...';
  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pass })
    });
    const d = await r.json();
    if (d.ok) {
      localStorage.setItem('vp_token', d.token);
      localStorage.setItem('vp_building', d.buildingName || '');
      window.location.href = '/app.html';
    } else if (d.expired) {
      window.location.href = '/pricing.html?reason=expired&email=' + encodeURIComponent(document.getElementById('loginEmail').value.trim());
    } else if (d.suspended) {
      window.location.href = '/pricing.html?reason=suspended&email=' + encodeURIComponent(document.getElementById('loginEmail').value.trim());
    } else {
      showMsg('msgLogin', d.error || 'שגיאה בהתחברות', 'err');
      btn.disabled = false; btn.textContent = 'כניסה';
    }
  } catch(e) {
    showMsg('msgLogin', 'שגיאת חיבור — נסה שוב', 'err');
    btn.disabled = false; btn.textContent = 'כניסה';
  }
}

async function doRegister() {
  const name     = document.getElementById('regName').value.trim();
  const building = document.getElementById('regBuilding').value.trim();
  const email    = document.getElementById('regEmail').value.trim();
  const phone    = document.getElementById('regPhone').value.trim();
  const pass     = document.getElementById('regPass').value;
  if (!name || !building || !email || !pass) { showMsg('msgRegister', 'יש למלא את כל השדות', 'err'); return; }
  if (pass.length < 6) { showMsg('msgRegister', 'סיסמה חייבת להכיל לפחות 6 תווים', 'err'); return; }
  const btn = document.getElementById('btnRegister');
  btn.disabled = true; btn.textContent = 'נרשם...';
  try {
    const r = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fullName: name, buildingName: building, email, phone, password: pass })
    });
    const d = await r.json();
    if (d.ok) {
      localStorage.setItem('vp_token', d.token);
      localStorage.setItem('vp_building', d.buildingName || '');
      window.location.href = '/app.html';
    } else {
      showMsg('msgRegister', d.error || 'שגיאה בהרשמה', 'err');
      btn.disabled = false; btn.textContent = 'הרשמה חינמית';
    }
  } catch(e) {
    showMsg('msgRegister', 'שגיאת חיבור — נסה שוב', 'err');
    btn.disabled = false; btn.textContent = 'הרשמה חינמית';
  }
}

// If already logged in → redirect
if (localStorage.getItem('vp_token')) {
  window.location.href = '/app.html';
}
</script>
</body>
</html>
